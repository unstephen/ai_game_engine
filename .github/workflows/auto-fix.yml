# CI 失败自动分析与 Issue 创建
# 当 CI 失败时，自动分析日志并创建 Issue

name: Auto Fix CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# 需要写入权限来创建 Issue
permissions:
  contents: read
  issues: write

jobs:
  analyze-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_branch }}
    
    - name: Download and analyze logs
      id: analyze
      run: |
        python3 .github/scripts/analyze_failure.py \
          --run-id ${{ github.event.workflow_run.id }} \
          --token ${{ secrets.GITHUB_TOKEN }}
