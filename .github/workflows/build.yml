name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  # ========== Linux 语法检查 ==========
  
  lint-linux:
    runs-on: ubuntu-latest
    name: Linux 语法检查
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y cppcheck clang-format
        
    - name: Run cppcheck
      run: |
        cppcheck --enable=warning,performance,portability \
                 --std=c++20 \
                 --language=c++ \
                 --suppress=missingIncludeSystem \
                 --error-exitcode=1 \
                 Source/

  # ========== Windows 真实编译 ==========
  # 注意：暂时跳过 mingw 预检查，直接跑 Windows 编译
  # mingw 用于本地快速验证，不用于 CI
  
  build-windows:
    runs-on: windows-latest
    name: Windows 编译
    needs: lint-linux  # 语法检查通过后才编译
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64
      
    - name: Build Release
      id: build
      run: |
        # 捕获编译输出到文件
        $ErrorActionPreference = "Continue"
        $output = cmake --build build --config Release 2>&1 | Tee-Object -FilePath build_output.log
        
        # 如果编译失败，输出错误日志并设置输出变量
        if ($LASTEXITCODE -ne 0) {
          Write-Host "::group::Build Error Log (Last 100 lines)"
          Get-Content build_output.log | Select-Object -Last 100
          Write-Host "::endgroup::"
          
          # 设置输出变量（用于后续步骤）
          $errorLog = Get-Content build_output.log | Select-Object -Last 100 | Out-String -Width 500
          # 转义特殊字符
          $errorLog = $errorLog -replace '%', '%25' -replace '`n', '%0A' -replace '`r', '%0D'
          echo "error_log=$errorLog" >> $env:GITHUB_OUTPUT
          echo "build_failed=true" >> $env:GITHUB_OUTPUT
          
          exit $LASTEXITCODE
        } else {
          echo "build_failed=false" >> $env:GITHUB_OUTPUT
        }
      shell: pwsh
      
    - name: Upload Build Log (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-error-log
        path: build_output.log
        retention-days: 7
      
    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Sample_Triangle
        path: build/bin/Release/Sample_Triangle.exe
        retention-days: 30