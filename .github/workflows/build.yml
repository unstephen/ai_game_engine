name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Linux 语法检查
  lint-linux:
    runs-on: ubuntu-latest
    name: Linux 语法检查
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y cppcheck clang-format
        
    - name: Run cppcheck
      run: |
        cppcheck --enable=warning,performance,portability \
                 --std=c++20 \
                 --language=c++ \
                 --suppress=missingIncludeSystem \
                 --error-exitcode=1 \
                 Source/

  # Windows 编译
  build-windows:
    runs-on: windows-latest
    name: Windows 编译
    needs: lint-linux  # 语法检查通过后才编译
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64
      
    - name: Build Release
      run: cmake --build build --config Release
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sample_Triangle
        path: build/bin/Release/Sample_Triangle.exe
        retention-days: 30