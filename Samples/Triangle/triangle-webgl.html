<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自研引擎 - 三角形示例 (WebGL 演示)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
        }
        #info h1 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #4CAF50;
        }
        #info p {
            margin: 5px 0;
            color: #ccc;
        }
        #fps {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 16px;
            color: #4CAF50;
            z-index: 100;
        }
        #status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            color: #888;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="info">
        <h1>🐉 自研引擎 - 三角形示例</h1>
        <p>Phase 1 RHI 核心框架演示</p>
        <p>技术栈：D3D12 / WebGL</p>
        <p>代码量：~12,000 行</p>
    </div>
    
    <div id="fps">FPS: --</div>
    
    <div id="status">初始化中...</div>
    
    <script type="module">
        // =========================================================
        // WebGL 三角形渲染 - 等效 D3D12 实现
        // =========================================================
        
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        
        if (!gl) {
            document.getElementById('status').textContent = '错误：WebGL 不支持';
            alert('您的浏览器不支持 WebGL');
            throw new Error('WebGL not supported');
        }
        
        // 调整画布大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        resize();
        window.addEventListener('resize', resize);
        
        // =========================================================
        // 顶点着色器
        // =========================================================
        const vsSource = `#version 300 es
            in vec3 a_position;
            in vec3 a_color;
            out vec3 v_color;
            
            void main() {
                gl_Position = vec4(a_position, 1.0);
                v_color = a_color;
            }
        `;
        
        // =========================================================
        // 像素着色器
        // =========================================================
        const psSource = `#version 300 es
            precision mediump float;
            in vec3 v_color;
            out vec4 fragColor;
            
            void main() {
                fragColor = vec4(v_color, 1.0);
            }
        `;
        
        // =========================================================
        // 编译着色器
        // =========================================================
        function compileShader(source, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }
        
        const vs = compileShader(vsSource, gl.VERTEX_SHADER);
        const ps = compileShader(psSource, gl.FRAGMENT_SHADER);
        
        // =========================================================
        // 创建程序
        // =========================================================
        const program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, ps);
        gl.linkProgram(program);
        
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
        }
        
        gl.useProgram(program);
        
        // =========================================================
        // 顶点数据 - 彩色三角形
        // =========================================================
        const vertices = new Float32Array([
            // 位置 (x, y, z)     颜色 (r, g, b)
             0.0,  0.5, 0.0,      1.0, 0.0, 0.0,  // 顶部 - 红色
             0.5, -0.5, 0.0,      0.0, 1.0, 0.0,  // 右下 - 绿色
            -0.5, -0.5, 0.0,      0.0, 0.0, 1.0   // 左下 - 蓝色
        ]);
        
        // =========================================================
        // 创建顶点缓冲区
        // =========================================================
        const vertexBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        
        // =========================================================
        // 顶点属性指针
        // =========================================================
        const positionLoc = gl.getAttribLocation(program, 'a_position');
        const colorLoc = gl.getAttribLocation(program, 'a_color');
        
        const stride = 6 * 4; // 6 floats * 4 bytes
        
        gl.enableVertexAttribArray(positionLoc);
        gl.vertexAttribPointer(positionLoc, 3, gl.FLOAT, false, stride, 0);
        
        gl.enableVertexAttribArray(colorLoc);
        gl.vertexAttribPointer(colorLoc, 3, gl.FLOAT, false, stride, 3 * 4);
        
        // =========================================================
        // 清屏颜色 - 深蓝色 (等效 D3D12)
        // =========================================================
        gl.clearColor(0.0, 0.1, 0.2, 1.0);
        gl.enable(gl.DEPTH_TEST);
        
        // =========================================================
        // 渲染循环
        // =========================================================
        let frameCount = 0;
        let lastTime = performance.now();
        let fps = 0;
        
        function render() {
            // 清屏
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            
            // 绘制三角形
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            
            // FPS 计算
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = now;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
            
            requestAnimationFrame(render);
        }
        
        // 启动渲染
        document.getElementById('status').textContent = '渲染中... | GPU: WebGL';
        render();
        
        // =========================================================
        // 控制台信息
        // =========================================================
        console.log('%c🐉 自研引擎 - 三角形示例', 'font-size: 20px; color: #4CAF50;');
        console.log('Phase 1 核心模块完成:');
        console.log('  ✅ D3D12Device');
        console.log('  ✅ D3D12Buffer');
        console.log('  ✅ D3D12Texture');
        console.log('  ✅ D3D12SwapChain');
        console.log('  ✅ D3D12FrameResourceManager');
        console.log('  ✅ D3D12UploadManager');
        console.log('  ✅ D3D12CommandList');
        console.log('');
        console.log('总代码量：~12,000 行');
        console.log('渲染效果：彩色三角形（红/绿/蓝顶点插值）');
    </script>
</body>
</html>
